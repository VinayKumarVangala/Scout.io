openapi: 3.0.0
info:
  title: Scout.io API
  version: 1.0.0
  description: Secure, multi-tenant proxy-based AI chat platform.

servers:
  - url: http://localhost:5000/api
    description: Local development server

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-admin-key
    TenantAuth:
      type: apiKey
      in: header
      name: x-client-id

paths:
  /chat/completions:
    post:
      summary: Get chat completion
      security:
        - TenantAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role: { type: string }
                      content: { type: string }
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  content: { type: string }

  /proxy/execute:
    post:
      summary: Execute secure proxy request
      security:
        - TenantAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string }
                method: { type: string }
                body: { type: object }
      responses:
        '200':
          description: Successful execution
